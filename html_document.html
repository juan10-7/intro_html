<!--declaración define que este documento es un documento HTML5-->
<!DOCTYPE html>
<!--elemento es el elemento raíz de una página HTML-->
<html lang="en">
<!--elemento contiene metadatos sobre el documento-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--elemento especifica un título para la página HTML (que se muestra en la barra de título del navegador o en la pestaña de la página)-->
    <title>Documento html basico</title>
</head>
<!-- elemento define el cuerpo del documento y sirve de contenedor para todo el contenido visible, como encabezados, párrafos, imágenes, hipervínculos, tablas, listas, etc.-->
<body>
    <!--elemento define un encabezado grande-->
    <h1>My First Heading</h1>
    <!--elemento define un párrafo-->
    <p>My first paragraph.</p>
</body>
</html>
